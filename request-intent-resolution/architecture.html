<h2>arXiv Orchestrator — Entity-Anchored Pipeline (request-intent-resolution)</h2>
<svg width="100%" viewBox="0 0 980 530" role="img">
<title>arXiv Orchestrator: offline abstract indexing, entity-anchored KG, HyDE anchor routing, on-demand pseudocode extraction, wiki solution</title>
<desc>
  Offline: abstracts to LLM extract (BM25+semantic RRF) yielding value_proposition (use case + novel utility),
  SPO+entities, and HyDE anchors (question · end-state). HyDE anchors feed anchor index. SPO becomes
  entity_set fingerprint, then throughline (entity-anchored, q_score), stored as wiki solutions in ingredient KG.
  Query: anchor match tries HyDE fast path first (question or end-state anchor). On confident hit → entity-set
  match directly. Fallback: intent → problem·objective → entity-set match. Query expansion always runs in
  parallel. On entity match: retrieve full paper, extract pseudocode (crystallized lessons, _methods.md).
  Throughlines from matched wiki solutions feed group synthesis. Pseudocode + group throughline land in wiki
  solution (IS the solution): stored in KG with q_score update.
</desc>
